<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Hey, me Lukas Software Developer from Germany. This is my portfolio listsmore about me, what i like, tools I use or programming languages I use.">
    <meta name="robots" content="index, follow">
    <meta name="copyright" content="Everything on this website is licensed under an ISC license. Links to other sites excluded.">
    <meta name="language" content="EN">
    <meta name="author" content="lukasjoc">
    <meta name="distribution" content="global">
    <meta name="rating" content="general">
    <meta name="description" content="{{ config.description }}">
    <link
      rel="canonical shortcut icon"
      type="image/x-icon"
      href="https://avatars1.githubusercontent.com/u/45790416">
    <link rel="stylesheet" href="https://unpkg.com/awsm.css/dist/awsm_theme_black.min.css">
    <style>
      html, body { font-size: 90%; font-family: monospace; }
      img { margin: 0; padding: 0; width: 10rem; height: 10rem; border-radius: 50%; }
      a { font-weight: 700; }
      pre { background: none !important; font-size: .75em; }
      @font-face {
        font-family: "Times";
        src: url("Times.ttc");
      }
    </style>
    {%if page.title %}
      <title>{{page.title}} | {{ config.title }} </title>
    {%else %}
      <title>{{ config.title }} </title>
    {%endif %}
  </head>
  <body>
    <header>
      <nav>
        <a href="{{ config.base_url }}">lukasjoc</a>
        <a href="/etc/impr">imprint</a>
      </nav>
    </header>
    <main>
      {% block main %} {% endblock %}
      <hr/>
      <a href="{{config.base_url}}">lukasjoc</a>, <span class="current-year"></span>
    </main>
    <script>
      let e = document.querySelector(".current-year")
      e.innerText = new Date().getFullYear()
    </script>
  </body>
</html>
