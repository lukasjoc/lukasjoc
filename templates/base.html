<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="index, follow">
    <meta name="copyright" content="Everything on this website is licensed under an ISC license. Links to other sites excluded.">
    <meta name="language" content="EN">
    <meta name="author" content="lukasjoc">
    <meta name="distribution" content="global">
    <meta name="rating" content="general">
    <meta name="description" content="{{ config.description }}">
    <link rel="canonical shortcut icon"
      type="image/x-icon"
      href="https://avatars1.githubusercontent.com/u/45790416">
     <link rel="stylesheet" href="../overwrites.css" type="text/css" />
    {%if page.title %}
      <title>{{page.title}} | {{ config.title }} </title>
    {%else %}
      <title>{{ config.title }} </title>
    {%endif %}
  </head>
  <body>
    <header>
      <nav>
        <a href="{{ config.base_url }}">lukasjoc</a>
        <a href="/etc/impr">imprint</a>
      </nav>
    </header>
    <main>
      {% block main %} {% endblock %}
      <hr/>
      {% block pagination %} {%endblock %}
    </main>
    <footer>
      <a href="{{config.base_url}}">lukasjoc</a>, <span class="current-year"></span>
    </footer>
    </main>
    <script>
      let e = document.querySelector(".current-year")
      e.innerText = new Date().getFullYear()
    </script>
  </body>
</html>
