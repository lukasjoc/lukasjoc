{% extends "base.html" %}
{% block main %}

      {{ page.updated }} / <strong> {{ page.title }} </strong>
    {%else %}
      {{ page.date }} / <strong> {{ page.title }} </strong>
    {%endif%}
  </small>
  {{ page.content | safe }}
{% endblock main %}
