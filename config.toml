# The URL the site will be built for
base_url = "https://lukasjoc.com"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

# the meta title of any page
title = "lukasjoc | Software Enthusiast and Programmer from Germany"

# the meta description of any page
description = "Personal HomePage by Lukas Jocham (lukasjoc) and some thoughts on things of life,fiction and technology"

# the default language
default_language = "en"

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true
highlight_theme = "1337"
smart_punctuation = true

[extra]
# Put all your custom variables here
